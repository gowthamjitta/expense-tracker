<!--suppress ALL -->
<!DOCTYPE html>
<html>
<head>
    <title>Pooji's Expense Tracker 💜</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee, #fcd5ce);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .glass {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(15px);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center text-gray-800">

<div class="w-full max-w-5xl p-8 glass rounded-3xl shadow-2xl">

    <!-- TITLE -->
    <h1 class="text-4xl text-center mb-8 font-semibold bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 text-transparent bg-clip-text">
        💜 Pooji's Expense Tracker ✨
    </h1>

    <!-- FORM -->
    <form method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">

        <input name="amount" type="number" placeholder="Amount 💸"
               class="p-3 rounded-xl bg-white/80">

        <input name="category" type="text" placeholder="Category 🏷️"
               class="p-3 rounded-xl bg-white/80">

        <input name="date" type="date"
               class="p-3 rounded-xl bg-white/80">

        <button class="bg-gradient-to-r from-pink-400 to-purple-500 text-white rounded-xl">
            Add ✨
        </button>
    </form>

    <!-- TOTALS -->
    <div class="grid grid-cols-3 gap-4 mb-8 text-center">

        <div class="bg-white/60 p-4 rounded-xl">
            <h2>📅 Today</h2>
            <p class="text-xl font-bold">₹ {{ today_total }}</p>
        </div>

        <div class="bg-white/60 p-4 rounded-xl">
            <h2>📊 Monthly</h2>
            <p class="text-xl font-bold">₹ {{ monthly_total }}</p>
        </div>

        <div class="bg-white/60 p-4 rounded-xl">
            <h2>📅 Yearly</h2>
            <p class="text-xl font-bold">₹ {{ yearly_total }}</p>
        </div>

    </div>

    <!-- TABLE -->
    <table class="w-full text-center bg-white/40 rounded-xl mb-6">
        <tr>
            <th>Amount 💸</th>
            <th>Category 🏷️</th>
            <th>Date 📅</th>
            <th>Delete</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>₹ {{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>
                <a href="/delete/{{ row[0] }}">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- CHART -->
    <canvas id="chart"></canvas>

</div>

<script>
    const dates = JSON.parse('{{ dates | tojson | safe }}');
    const amounts = JSON.parse('{{ amounts | tojson | safe }}');

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: "Expenses 💸",
                data: amounts,
                borderWidth: 2,
                tension: 0.3
            }]
        }
    });
</script>

</body>
</html>
