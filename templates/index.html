<!DOCTYPE html>
<html>
<head>
    <title>Pooji's Expense Tracker 💜</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
        }

        h2 {
            text-align: center;
            color: #6a11cb;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, button {
            padding: 10px;
            border-radius: 8px;
        }

        button {
            background: #6a11cb;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 20px;
        }

        th {
            background: #6a11cb;
            color: white;
        }

        td, th {
            padding: 10px;
            text-align: center;
        }

        .delete-btn {
            background: red;
            color: white;
            border-radius: 6px;
            padding: 5px;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💜 Pooji's Expense Tracker 💜</h2>

    <!-- FORM -->
    <form method="POST">
        <input type="number" name="amount" placeholder="Amount" required>
        <input type="text" name="category" placeholder="Category" required>
        <input type="date" name="date" required>
        <button>Add Expense</button>
    </form>

    <!-- TABLE -->
    <table border="1">
        <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Delete</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>
                <a href="/delete/{{ row[0] }}">
                    <button class="delete-btn">❌</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- TOTALS -->
    <h3>Monthly Total: {{ monthly_total }}</h3>
    <h3>Yearly Total: {{ yearly_total }}</h3>

    <!-- GRAPH -->
    <canvas id="chart"></canvas>

</div>

<script>
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ dates | tojson }},
            datasets: [{
                label: 'Expenses',
                data: {{ amounts | tojson }},
                borderWidth: 2
            }]
        }
    });
</script>

</body>
</html>
